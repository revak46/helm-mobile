<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>myATLAS — Your life, mapped with intention</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#05050e;color:#e0ddd6;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
body{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:env(safe-area-inset-top,20px) 20px calc(env(safe-area-inset-bottom,20px) + 16px);overflow-x:hidden}

/* Ambient glow */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 30%,rgba(200,169,110,0.05) 0%,transparent 60%);
}

/* ── Header ── */
.wordmark{
  text-align:center;margin-top:clamp(32px,8dvh,64px);
  opacity:0;animation:wordIn .9s cubic-bezier(.16,1,.3,1) .3s forwards;
}
.wordmark-main{
  display:block;font-size:clamp(38px,10vw,56px);font-weight:300;
  letter-spacing:.22em;color:#e0ddd6;
}
.wordmark-main strong{font-weight:600;color:#c8a96e}
.wordmark-sub{
  display:block;font-size:11px;letter-spacing:.30em;text-transform:uppercase;
  color:rgba(224,221,214,.5);margin-top:6px;
}
@keyframes wordIn{from{opacity:0;letter-spacing:.38em}to{opacity:1;letter-spacing:.22em}}

/* ── Dial ── */
.dial-wrap{
  width:min(260px,62vw);aspect-ratio:1;margin:clamp(24px,5dvh,40px) 0;
  flex-shrink:0;
}
.dial-wrap svg{width:100%;height:100%;overflow:visible}
.tick-ring{
  transform-origin:100px 100px;
  opacity:0;animation:dialSpin 1.8s cubic-bezier(.33,1,.68,1) .6s forwards;
}
@keyframes dialSpin{from{transform:rotate(-90deg);opacity:0}to{transform:rotate(270deg);opacity:1}}

/* ── Pillar dots ── */
.pillar-row{
  display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fadeUp .7s ease 2s forwards;
}
.pillar-chip{
  display:flex;align-items:center;gap:6px;
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(224,221,214,.5);
}
.pillar-chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Tagline ── */
.tagline{
  font-size:clamp(11px,2.5vw,13px);letter-spacing:.14em;text-transform:uppercase;
  color:rgba(224,221,214,.5);margin-top:20px;text-align:center;
  opacity:0;animation:fadeUp .7s ease 1.8s forwards;
}

/* ── Feature cards ── */
.features{
  display:grid;grid-template-columns:repeat(2,1fr);gap:10px;
  width:100%;max-width:340px;margin-top:24px;
  opacity:0;animation:fadeUp .7s ease 2.3s forwards;
}
.feat{
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:14px 12px;text-align:center;
}
.feat-icon{font-size:32px;margin-bottom:6px}
.feat-name{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#e0ddd6}
.feat-sub{font-size:9px;color:rgba(224,221,214,.5);margin-top:3px}

/* ── CTA row ── */
.cta-row{
  display:flex;gap:12px;margin-top:28px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fadeUp .7s ease 2.6s forwards;
}
.cta{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:1px solid rgba(200,169,110,.25);
  border-radius:999px;padding:12px 22px;
  font-size:12px;font-family:inherit;letter-spacing:.06em;
  color:#c8a96e;cursor:pointer;text-decoration:none;
  transition:background .2s,border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.cta:active{background:rgba(200,169,110,.12);border-color:rgba(200,169,110,.5)}

/* ── Navigation ── */
.nav-row{
  display:flex;gap:10px;margin-top:32px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fadeUp .6s ease 2.8s forwards;
}
.nav-pill{
  font-size:10px;letter-spacing:.06em;color:rgba(224,221,214,.5);
  text-decoration:none;padding:8px 14px;border-radius:999px;
  border:1px solid rgba(255,255,255,.06);transition:border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.nav-pill:active{border-color:rgba(200,169,110,.3)}

/* ── Footer ── */
.footer{
  margin-top:auto;padding-top:28px;
  font-size:8px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(224,221,214,.12);text-align:center;
  opacity:0;animation:fadeUp .6s ease 3s forwards;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-delay:0s!important}}
</style>
</head>
