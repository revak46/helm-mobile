<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#05050e;color:#e0ddd6;font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
body{
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;
  padding:env(safe-area-inset-top,20px) 16px calc(env(safe-area-inset-bottom,20px) + 16px);
  overflow-x:hidden;-webkit-tap-highlight-color:transparent;
}

/* Ambient glow — shifts per mood */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 35%,var(--glow,rgba(212,132,90,0.06)) 0%,transparent 60%);
  transition:background 1s ease;
}

/* ── Header ── */
.header{
  text-align:center;margin-top:clamp(28px,6dvh,48px);position:relative;z-index:1;
  opacity:0;animation:fadeDown .8s ease .2s forwards;
}
.header h1{font-size:clamp(30px,8vw,42px);font-weight:300;letter-spacing:.18em;color:#e0ddd6}
.header h1 strong{font-weight:700;color:#c8a96e}
.header p{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(224,221,214,.5);margin-top:5px}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* ── Mood selector ── */
.mood-ring{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  width:100%;max-width:320px;margin-top:clamp(20px,4dvh,36px);
  position:relative;z-index:1;
  opacity:0;animation:fadeUp .7s ease .5s forwards;
}
.mood-btn{
  appearance:none;background:rgba(255,255,255,.03);
  border:1.5px solid rgba(255,255,255,.07);border-radius:14px;
  padding:12px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:all .3s ease;
  -webkit-tap-highlight-color:transparent;
}
.mood-btn.active{
  border-color:var(--c);background:rgba(255,255,255,.06);
  box-shadow:0 0 20px color-mix(in srgb,var(--c) 20%,transparent);
}
.mood-btn .mi{font-size:34px;transition:transform .25s}
.mood-btn.active .mi{transform:scale(1.12)}
.mood-btn .ml{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(224,221,214,.55);transition:color .25s}
.mood-btn.active .ml{color:#e0ddd6}

/* ── Card stage ── */
.card-stage{
  position:relative;width:100%;max-width:360px;
  aspect-ratio:3/2;min-height:200px;
  margin-top:clamp(20px,4dvh,32px);
  z-index:1;
}
.quote-card{
  position:absolute;inset:0;border-radius:18px;
  background:rgba(13,13,26,.88);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 24px;text-align:center;
  will-change:transform,opacity;
  transition:all .5s cubic-bezier(.22,1,.36,1);
  pointer-events:none;
  opacity:0;transform:translateX(50px) scale(.94);
}
.quote-card.center{opacity:1;transform:translateX(0) scale(1);pointer-events:auto}
.quote-card.left{opacity:0;transform:translateX(-50px) scale(.94)}

.quote-text{
  font-size:clamp(15px,3.8vw,18px);font-weight:300;line-height:1.7;
  color:#e0ddd6;letter-spacing:.01em;max-width:300px;
}
.quote-attr{
  margin-top:14px;font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(224,221,214,.5);
}
.quote-mood{
  margin-top:10px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 14px;border-radius:99px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
}

/* ── Dots + hint ── */
.card-dots{
  display:flex;gap:7px;margin-top:16px;z-index:1;
  opacity:0;animation:fadeUp .6s ease 1s forwards;
}
.cdot{
  width:7px;height:7px;border-radius:50%;background:rgba(224,221,214,.1);
  transition:all .3s;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.cdot.active{background:var(--accent,#d4845a);box-shadow:0 0 8px var(--accent,#d4845a)}
.swipe-hint{
  margin-top:10px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(224,221,214,.5);z-index:1;
  opacity:0;animation:fadeUp .5s ease 1.3s forwards;
}

/* ── Navigation ── */
.nav-row{
  display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;justify-content:center;z-index:1;
  opacity:0;animation:fadeUp .5s ease 1.5s forwards;
}
.nav-pill{
  font-size:10px;letter-spacing:.06em;color:#c8a96e;
  text-decoration:none;padding:10px 18px;border-radius:999px;
  border:1px solid rgba(200,169,110,.2);transition:border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.nav-pill:active{border-color:rgba(200,169,110,.45)}

/* ── Footer ── */
.footer{
  margin-top:auto;padding-top:24px;
  font-size:8px;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(224,221,214,.1);text-align:center;z-index:1;
  opacity:0;animation:fadeUp .5s ease 1.7s forwards;
}

/* ── Particles ── */
.particle{
  position:fixed;width:3px;height:3px;border-radius:50%;
  background:var(--accent,#d4845a);opacity:0;pointer-events:none;z-index:0;
  animation:floatUp linear forwards;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(0) scale(.6)}
  12%{opacity:.5}
  80%{opacity:.3}
  100%{opacity:0;transform:translateY(-100px) scale(.15)}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01s!important;animation-delay:0s!important;transition-duration:.01s!important}}
</style>
</head>
<body>

<div class="header">
  <h1>HYPE<strong>BOARD</strong></h1>
  <p>The mood engine &middot; A.Kembi</p>
</div>

<div class="mood-ring" id="mood-ring"></div>
<div class="card-stage" id="card-stage"></div>
<div class="card-dots" id="card-dots"></div>
<div class="swipe-hint">&larr; swipe &middot; tap sides &rarr;</div>

<div class="nav-row">
  <a class="nav-pill" href="helm.html">Meet Helm</a>
  <a class="nav-pill" href="status.html">Live Status</a>
  <a class="nav-pill" href="architecture.html">Architecture</a>
  <a class="nav-pill" href="myatlas.html">MyAtlas</a>
  <a class="nav-pill" href="digest.html">Digest</a>
</div>

<div class="footer">Helm Intelligence &middot; A.KEMBI &middot; 2026</div>

<script>
const MOODS=[
  {id:'fired',name:'Fired Up',icon:'🔥',color:'#d4845a',glow:'rgba(212,132,90,0.07)'},
  {id:'calm',name:'Calm',icon:'🌊',color:'#6a8fad',glow:'rgba(106,143,173,0.07)'},
  {id:'reflect',name:'Reflective',icon:'🪞',color:'#8a6abf',glow:'rgba(138,106,191,0.07)'},
  {id:'playful',name:'Playful',icon:'✨',color:'#c8a96e',glow:'rgba(200,169,110,0.07)'},
  {id:'grateful',name:'Grateful',icon:'🤲',color:'#5a9e6f',glow:'rgba(90,158,111,0.07)'},
  {id:'driven',name:'Determined',icon:'⚡',color:'#e07a5f',glow:'rgba(224,122,95,0.07)'},
];
const QUOTES={
  fired:[
    {text:"Hold fast to dreams, for if dreams die, life is a broken-winged bird that cannot fly.",attr:"Langston Hughes"},
    {text:"Not everything that is faced can be changed, but nothing can be changed until it is faced.",attr:"James Baldwin"},
    {text:"The beautiful ones are not yet born — but they are coming.",attr:"Ayi Kwei Armah"},
    {text:"I, too, sing America. I am the darker brother.",attr:"Langston Hughes"},
    {text:"The fire next time is now. Act accordingly.",attr:"James Baldwin"},
  ],
  calm:[
    {text:"All that we see or seem is but a dream within a dream.",attr:"Edgar Allan Poe"},
    {text:"Deep into that darkness peering, long I stood there, wondering, fearing.",attr:"Edgar Allan Poe"},
    {text:"Silence is the sleep that nourishes wisdom.",attr:"Francis Bacon"},
    {text:"The quieter you become, the more you can hear.",attr:"Rumi"},
    {text:"In the stillness of your presence, you can feel your own formless and timeless reality.",attr:"Eckhart Tolle"},
  ],
  reflect:[
    {text:"The years teach much which the days never know.",attr:"Ralph Waldo Emerson"},
    {text:"He who is not everyday conquering some fear has not learned the secret of life.",attr:"Ralph Waldo Emerson"},
    {text:"We are not makers of history. We are made by history.",attr:"Martin Luther King Jr."},
    {text:"The unexamined life is not worth living.",attr:"Socrates"},
    {text:"There is no greater agony than bearing an untold story inside you.",attr:"Maya Angelou"},
  ],
  playful:[
    {text:"Creativity is intelligence having fun.",attr:"Albert Einstein"},
    {text:"Life is either a daring adventure or nothing at all.",attr:"Helen Keller"},
    {text:"The only way to do great work is to love what you do.",attr:"Steve Jobs"},
    {text:"I have not failed. I've just found 10,000 ways that won't work.",attr:"Thomas Edison"},
    {text:"Imagination is the beginning of creation.",attr:"George Bernard Shaw"},
  ],
  grateful:[
    {text:"When I started counting my blessings, my whole life turned around.",attr:"Willie Nelson"},
    {text:"Gratitude is not only the greatest of virtues, but the parent of all others.",attr:"Cicero"},
    {text:"Joy is the simplest form of gratitude.",attr:"Karl Barth"},
    {text:"Enough is a feast.",attr:"Buddhist Proverb"},
    {text:"What you are is what you have been. What you'll be is what you do now.",attr:"Buddha"},
  ],
  driven:[
    {text:"I am my best work — a series of road maps, reports, recipes and doodles.",attr:"Audre Lorde"},
    {text:"If there is no struggle, there is no progress.",attr:"Frederick Douglass"},
    {text:"A dream doesn't become reality through magic; it takes sweat, determination and hard work.",attr:"Colin Powell"},
    {text:"The way to get started is to quit talking and begin doing.",attr:"Walt Disney"},
    {text:"Success is not final, failure is not fatal: it is the courage to continue that counts.",attr:"Winston Churchill"},
  ],
};

let mood='fired',idx=0,tx=0;
const $ring=document.getElementById('mood-ring'),$stage=document.getElementById('card-stage'),$dots=document.getElementById('card-dots');

// Build mood grid
MOODS.forEach(m=>{
  const b=document.createElement('button');
  b.className='mood-btn'+(m.id===mood?' active':'');
  b.style.setProperty('--c',m.color);b.dataset.mood=m.id;
  b.innerHTML=`<span class="mi">${m.icon}</span><span class="ml">${m.name}</span>`;
  b.onclick=()=>pick(m.id);$ring.appendChild(b);
});

function pick(id){
  mood=id;idx=0;
  const m=MOODS.find(x=>x.id===id);
  document.body.style.setProperty('--glow',m.glow);
  document.documentElement.style.setProperty('--accent',m.color);
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.toggle('active',b.dataset.mood===id));
  burst(m.color,6);render();
}

function render(){
  const qs=QUOTES[mood],m=MOODS.find(x=>x.id===mood);
  $stage.innerHTML='';$dots.innerHTML='';
  qs.forEach((q,i)=>{
    const c=document.createElement('div');
    c.className='quote-card'+(i===idx?' center':i<idx?' left':' right');
    c.innerHTML=`<div class="quote-text">${q.text}</div><div class="quote-attr">— ${q.attr}</div><div class="quote-mood" style="border-color:${m.color}25;color:${m.color}">${m.icon} ${m.name}</div>`;
    $stage.appendChild(c);
    const d=document.createElement('div');
    d.className='cdot'+(i===idx?' active':'');
    d.onclick=()=>{idx=i;render();};
    $dots.appendChild(d);
  });
}

function next(){if(idx<QUOTES[mood].length-1){idx++;render();}}
function prev(){if(idx>0){idx--;render();}}

// Touch swipe
$stage.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX},{passive:true});
$stage.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>36){d<0?next():prev();}},{passive:true});
// Tap halves
$stage.addEventListener('click',e=>{const r=$stage.getBoundingClientRect(),x=e.clientX-r.left;x>r.width*.6?next():x<r.width*.4?prev():void 0;});
// Keys
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();});

// Particles
function burst(color,n){
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='particle';
    p.style.setProperty('--accent',color);
    p.style.left=(25+Math.random()*50)+'%';p.style.top=(35+Math.random()*30)+'%';
    p.style.animationDuration=(2+Math.random()*2.5)+'s';
    p.style.animationDelay=(Math.random()*.6)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),5000);
  }
}
setInterval(()=>{burst(MOODS.find(x=>x.id===mood).color,2)},4500);

// Init
document.documentElement.style.setProperty('--accent','#d4845a');
render();burst('#d4845a',4);
</script>
</body>
</html>
