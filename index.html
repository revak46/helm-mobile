<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Helm">
<meta name="theme-color" content="#0a0a0a">
<title>Helm — Live Status</title>
<style>
:root {
  --bg:#0a0a0a;--surface:#141414;--border:#2a2a2a;--text:#e8e4dd;
  --muted:#8a8680;--accent:#c8a96e;--accent-dim:rgba(200,169,110,0.15);
  --hot:#d4845a;--warm:#c8a96e;--cool:#6a8fad;--silent:#4a4a4a;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,sans-serif;
  --display:'SF Pro Display',-apple-system,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.c{max-width:420px;margin:0 auto;padding:20px 16px 40px}
.hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.hdr h1{font-family:var(--display);font-size:22px;font-weight:600;letter-spacing:.5px;color:var(--accent)}
.hdr .ts{font-size:12px;color:var(--muted)}
.date{font-family:var(--display);font-size:17px;font-weight:500;margin-bottom:20px}
.sbar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.sbar .l{font-size:13px;color:var(--muted)}
.sbar .n{font-family:var(--display);font-size:24px;font-weight:600;color:var(--accent)}
.lbl{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.sec{margin-bottom:24px}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.pc.hot::before{background:var(--hot)}.pc.warm::before{background:var(--warm)}.pc.cool::before{background:var(--cool)}.pc.silent::before{background:var(--silent)}
.pn{font-size:13px;font-weight:600;margin-bottom:4px}
.pm{display:flex;justify-content:space-between;align-items:center}
.mo{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.pc.hot .mo{color:var(--hot)}.pc.warm .mo{color:var(--warm)}.pc.cool .mo{color:var(--cool)}.pc.silent .mo{color:var(--silent)}
.ct{font-size:11px;color:var(--muted)}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.dt{font-size:14px;line-height:1.6;white-space:pre-wrap}
.de{font-size:13px;color:var(--muted);font-style:italic}
.al{display:flex;flex-direction:column;gap:6px}
.ai{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.an{font-size:13px;font-weight:500;flex:1}
.ab{display:flex;gap:4px;margin-left:8px}
.abg{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent-dim);color:var(--accent);font-weight:500}
.ac{font-size:11px;color:var(--muted);margin-left:8px;white-space:nowrap}
.sl{display:flex;flex-direction:column;gap:6px}
.si{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.5}
.st{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:4px}
.ft{text-align:center;padding-top:20px;border-top:1px solid var(--border);margin-top:32px;font-size:11px;color:var(--muted);letter-spacing:.5px}
.ld{text-align:center;padding:60px 20px;color:var(--muted)}
.sp{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:s .8s linear infinite;margin-bottom:12px}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="c" id="app">
  <div class="ld"><div class="sp"></div><div>Loading...</div></div>
</div>
<script>
async function load(){
  const a=document.getElementById('app');
  try{
    const r=await fetch('helm-status.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    render(await r.json());
  }catch(e){
    a.innerHTML='<div class="hdr"><h1>HELM</h1></div><div class="dc"><div class="de">Status unavailable: '+esc(e.message)+'</div></div>';
  }
}
function render(d){
  const a=document.getElementById('app');
  const p=(d.pillars||[]).map(p=>{const m=(p.momentum||'silent').toLowerCase();return'<div class="pc '+m+'"><div class="pn">'+esc(p.name)+'</div><div class="pm"><span class="mo">'+esc(p.momentum||'Silent')+'</span><span class="ct">'+(p.signal_count||0)+' signals</span></div></div>'}).join('');
  const ar=(d.arcs||[]).map(a=>'<div class="ai"><span class="an">'+esc(a.label)+'</span><div class="ab">'+(a.pillars||[]).map(p=>'<span class="abg">'+esc(p)+'</span>').join('')+'</div><span class="ac">'+(a.signal_count||0)+'</span></div>').join('');
  const sg=(d.suggestions||[]).map(s=>'<div class="si">'+(s.type?'<div class="st">'+esc(s.type)+'</div>':'')+esc(s.text)+'</div>').join('');
  const dg=d.digest?'<div class="dt">'+esc(d.digest)+'</div>':'<div class="de">No digest yet</div>';
  a.innerHTML='<div class="hdr"><h1>HELM</h1><span class="ts">'+esc(d.time||'')+'</span></div><div class="date">'+esc(d.date||'')+'</div><div class="sbar"><span class="l">Total Signals</span><span class="n">'+(d.signal_count||0)+'</span></div><div class="sec"><div class="lbl">Pillars</div><div class="pgrid">'+p+'</div></div>'+((d.arcs||[]).length?'<div class="sec"><div class="lbl">Active Arcs</div><div class="al">'+ar+'</div></div>':'')+((d.suggestions||[]).length?'<div class="sec"><div class="lbl">Suggestions</div><div class="sl">'+sg+'</div></div>':'')+' <div class="sec"><div class="lbl">Digest</div><div class="dc">'+dg+'</div></div><div class="ft">HELM INTELLIGENCE</div>';
}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
load();
document.addEventListener('visibilitychange',()=>{if(!document.hidden)load()});
</script>
</body>
</html>
